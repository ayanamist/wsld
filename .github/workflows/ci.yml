name: CI

on: [push]

permissions:
  contents: write

jobs:
  build-wsl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build
        working-directory: client
        run: cargo build --release

      - name: Strip Debug Symbols
        run: strip target/release/wsld

      - uses: actions/upload-artifact@v7
        with:
          name: 'wsld'
          path: target/release/wsld

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build
        working-directory: server
        run: cargo build --release

      - uses: actions/upload-artifact@v7
        with:
          name: 'wsldhost.exe'
          path: target/release/wsldhost.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-wsl, build-windows]
    # Publish on tag pushes and on pushes to the default branch (nightly).
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          files: |
            artifacts/wsld
            artifacts/wsldhost.exe

      - name: Nightly release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: |
            artifacts/wsld
            artifacts/wsldhost.exe
